# pzest - Photometric Redshift Estimation configuration
# Model 1 configuration - archived reference only
# Trained: [24/4/2026]
# Best epoch: 141, best val sigma_NMAD: 0.0163
# Do not modify - use default.yaml for active training

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  processed_hdf5_file: data/processed/processed.hdf5
  splits_file: data/splits.csv
  checkpoints_dir: outputs/checkpoints
  best_checkpoint: outputs/checkpoints/best_checkpoint.pt
  figures: outputs/figures

data:
  hdf5_filename: DESI_HSC_64x64_v2.hdf5
  chunk_size: 500
  val_fraction: 0.15
  test_fraction: 0.15
  random_seed: 42
  include_psf: false

model:
  backbone: inception
  use_magnitudes: true
  magnitude_hidden_dim: 32
  num_bins: 200
  # Redshift range based on dataset. Only change if targeting a specific range
  redshift_min: 0.0
  redshift_max: 4.0

train:
  epochs: 150
  batch_size: 128
  learning_rate: 1.0e-4
  patience: 15
  loss_function: crps
  use_weighted_sampling: true
  label_sigma_bins: 2
  lr_scheduler:
    enabled: true
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6
  num_workers: 0        # 0 is best for Windows, increase for Linux/macOS if needed


evaluation:
  num_vis_samples: 8
